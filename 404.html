<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192.png">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <title>Page not found | Tim Downs Mullen</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-dark: #0a192f;
            --primary-light: #112240;
            --accent: #64ffda;
            --text-main: #ccd6f6;
            --text-muted: #a8b2d1;
        }
        * { box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background-color: var(--primary-dark);
            color: var(--text-main);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }
        header {
            padding: 2rem 8%;
        }
        .logo {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--text-main);
            text-decoration: none;
        }
        .logo span { color: var(--accent); }
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start;
            padding: 0 8% 8rem;
            max-width: 720px;
        }
        .code {
            font-size: clamp(4rem, 14vw, 8rem);
            font-weight: 800;
            letter-spacing: -0.03em;
            color: var(--accent);
            line-height: 1;
            margin: 0 0 1.5rem;
        }
        h1 {
            font-size: clamp(1.5rem, 4vw, 2.2rem);
            font-weight: 600;
            margin: 0 0 1rem;
        }
        p {
            color: var(--text-muted);
            font-size: 1.1rem;
            margin: 0 0 2.5rem;
        }
        .links {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem 2rem;
        }
        .links a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
            border-bottom: 1px solid transparent;
            transition: border-color 0.2s ease;
        }
        .links a:hover { border-bottom-color: var(--accent); }
    </style>
</head>
<body>
    <!-- Draft copy below — outward-facing, Tim rules before merge. -->
    <header>
        <a class="logo" href="/">Tim <span>Downs Mullen</span></a>
    </header>
    <main>
        <div class="code">404</div>
        <h1>This page doesn&rsquo;t exist &mdash; or it moved.</h1>
        <p>No harm done. Here are the paths that go somewhere:</p>
        <nav class="links">
            <a href="/">&rarr; Home</a>
            <a href="/#insights">&rarr; Insights &amp; case studies</a>
        </nav>
    </main>
</body>
</html>
